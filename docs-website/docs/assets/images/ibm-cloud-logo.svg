<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- IBM Cloud Logo - Simple Text-based Version -->
  <defs>
    <style>
      .logo-text { fill: #ffffff; font-family: 'IBM Plex Sans', Arial, sans-serif; font-weight: 600; }
      .logo-cloud { fill: #0f62fe; }
    </style>
  </defs>
  
  <!-- IBM Text -->
  <text x="10" y="35" class="logo-text" font-size="28">IBM</text>
  
  <!-- Cloud Icon -->
  <g transform="translate(80, 15)">
    <path class="logo-cloud" d="M20,15 Q15,10 10,15 Q5,10 0,15 L0,25 Q5,30 10,25 Q15,30 20,25 Z"/>
  </g>
  
  <!-- Cloud Text -->
  <text x="110" y="35" class="logo-text" font-size="24">Cloud</text>
</svg>

